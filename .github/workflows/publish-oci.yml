name: Publish OCI

'on':
  workflow_dispatch:
    inputs:
      version:
        description: 'OCI image tag (e.g. 1.0.1). Defaults to the root package.json version.'
        required: false
        default: ''

env:
  IMAGE_NAMESPACE: veecode
  IMAGE_NAME: backstage-aws-dynamic-plugins

jobs:
  publish-oci:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v2

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          VERSION="$INPUT_VERSION"
          if [ -z "$VERSION" ]; then
            VERSION="$(jq -r .version package.json)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing ${IMAGE_NAMESPACE}/${IMAGE_NAME}:${VERSION}"

      - name: Log in to Quay.io
        uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603 # v1.7
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USER }}
          password: ${{ secrets.QUAY_TOKEN }}

      # Born public: create the repository already public BEFORE the first push,
      # so it never exists as private. Idempotent — if it already exists, Quay
      # returns 400 and the post-push step below enforces public visibility.
      - name: Ensure repository exists and is public
        env:
          QUAY_API_TOKEN: ${{ secrets.QUAY_API_TOKEN }}
        run: |
          if [ -z "$QUAY_API_TOKEN" ]; then
            echo "::error::QUAY_API_TOKEN not set — cannot guarantee public visibility"
            exit 1
          fi
          echo -n "Creating ${IMAGE_NAMESPACE}/${IMAGE_NAME} as public... "
          status=$(curl -s -o /tmp/create.out -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${QUAY_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"namespace\":\"${IMAGE_NAMESPACE}\",\"repository\":\"${IMAGE_NAME}\",\"visibility\":\"public\",\"repo_kind\":\"image\",\"description\":\"VeeCode AWS dynamic plugins for Backstage / DevPortal\"}" \
            "https://quay.io/api/v1/repository")
          if [ "$status" = "201" ] || [ "$status" = "200" ]; then
            echo "created public."
          elif [ "$status" = "400" ]; then
            echo "already exists (will enforce public after push)."
          else
            echo "unexpected HTTP ${status}:"
            cat /tmp/create.out
            exit 1
          fi

      - name: Build and push OCI image
        env:
          CI: true
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          make publish-oci CONTAINER_TOOL=podman VERSION="$VERSION"

      # Enforce public even if the repo pre-existed as private. No
      # intentionally-private phase — this only re-asserts the public state.
      - name: Enforce public visibility
        env:
          QUAY_API_TOKEN: ${{ secrets.QUAY_API_TOKEN }}
        run: |
          echo -n "Setting ${IMAGE_NAMESPACE}/${IMAGE_NAME} to public... "
          status=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${QUAY_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"visibility":"public"}' \
            "https://quay.io/api/v1/repository/${IMAGE_NAMESPACE}/${IMAGE_NAME}/changevisibility")
          if [ "$status" = "200" ]; then
            echo "OK"
          else
            echo "FAILED (HTTP ${status})"
            exit 1
          fi

      - name: Summary
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "### Published \`quay.io/${IMAGE_NAMESPACE}/${IMAGE_NAME}:${VERSION}\` (public)" >> "$GITHUB_STEP_SUMMARY"
