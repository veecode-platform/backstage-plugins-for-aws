name: Publish OCI

'on':
  workflow_dispatch:
    inputs:
      version:
        description: 'OCI image tag (e.g. 1.0.1). Defaults to the root package.json version.'
        required: false
        default: ''

env:
  IMAGE_NAMESPACE: veecode
  IMAGE_NAME: backstage-aws-dynamic-plugins

jobs:
  publish-oci:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v2

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          VERSION="$INPUT_VERSION"
          if [ -z "$VERSION" ]; then
            VERSION="$(jq -r .version package.json)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing ${IMAGE_NAMESPACE}/${IMAGE_NAME}:${VERSION}"

      - name: Log in to Quay.io
        uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603 # v1.7
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USER }}
          password: ${{ secrets.QUAY_TOKEN }}

      # Born public: guarantee the repo is public WITHOUT a private phase.
      # If it is already public (Quay repos are world-readable), no API token is
      # needed at all. The OAuth API token is only required to create a brand-new
      # repo as public, or to flip an existing private one.
      - name: Ensure repository is public
        id: vis
        env:
          QUAY_API_TOKEN: ${{ secrets.QUAY_API_TOKEN }}
        run: |
          status=$(curl -s -o /tmp/repo.json -w "%{http_code}" \
            "https://quay.io/api/v1/repository/${IMAGE_NAMESPACE}/${IMAGE_NAME}?includeTags=false")
          if [ "$status" = "200" ] && [ "$(jq -r '.is_public' /tmp/repo.json)" = "true" ]; then
            echo "Repository already public — no API management needed."
            echo "needs_enforce=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$QUAY_API_TOKEN" ]; then
            echo "::error::Repo is not public and QUAY_API_TOKEN is missing/invalid. Provide an OAuth application token (scopes: repo:create, repo:admin)."
            exit 1
          fi
          if [ "$status" = "404" ]; then
            echo -n "Creating ${IMAGE_NAMESPACE}/${IMAGE_NAME} as public... "
            c=$(curl -s -o /tmp/create.out -w "%{http_code}" -X POST \
              -H "Authorization: Bearer ${QUAY_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"namespace\":\"${IMAGE_NAMESPACE}\",\"repository\":\"${IMAGE_NAME}\",\"visibility\":\"public\",\"repo_kind\":\"image\",\"description\":\"VeeCode AWS dynamic plugins for Backstage / DevPortal\"}" \
              "https://quay.io/api/v1/repository")
            if [ "$c" = "201" ] || [ "$c" = "200" ]; then echo "created."; else echo "FAILED (HTTP ${c}):"; cat /tmp/create.out; exit 1; fi
          fi
          echo "needs_enforce=true" >> "$GITHUB_OUTPUT"

      - name: Build and push OCI image
        env:
          CI: true
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          make publish-oci CONTAINER_TOOL=podman VERSION="$VERSION"

      # Only runs when the repo was newly created or was private — never for an
      # already-public repo. Re-asserts public after the push completes.
      - name: Enforce public visibility
        if: steps.vis.outputs.needs_enforce == 'true'
        env:
          QUAY_API_TOKEN: ${{ secrets.QUAY_API_TOKEN }}
        run: |
          echo -n "Setting ${IMAGE_NAMESPACE}/${IMAGE_NAME} to public... "
          status=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${QUAY_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"visibility":"public"}' \
            "https://quay.io/api/v1/repository/${IMAGE_NAMESPACE}/${IMAGE_NAME}/changevisibility")
          if [ "$status" = "200" ]; then
            echo "OK"
          else
            echo "FAILED (HTTP ${status})"
            exit 1
          fi

      - name: Summary
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "### Published \`quay.io/${IMAGE_NAMESPACE}/${IMAGE_NAME}:${VERSION}\` (public)" >> "$GITHUB_STEP_SUMMARY"
