name: Upstream divergence report

# Reports how far this fork has drifted from awslabs/backstage-plugins-for-aws.
# Opens (or refreshes) a single pinned issue with the current divergence
# numbers, the list of upstream commits since our last recorded merge in
# FORK_MERGES.md, and a file-level diff summary.
#
# See FORK_PLAN.md (Task 1.3) for context.

'on':
  schedule:
    - cron: '0 12 * * 1'  # Mondays 12:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: upstream-divergence
  cancel-in-progress: false

jobs:
  report:
    name: Compute and publish divergence report
    runs-on: ubuntu-latest
    env:
      UPSTREAM_URL: https://github.com/awslabs/backstage-plugins-for-aws.git
      FORK_POINT: 1b0c194
      ISSUE_TITLE: 'Upstream divergence report'
      ISSUE_LABEL: upstream-divergence
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream "$UPSTREAM_URL" || \
            git remote set-url upstream "$UPSTREAM_URL"
          git fetch upstream --quiet

      - name: Determine last-merged upstream tip
        id: lastmerge
        run: |
          # Read first "Upstream tip merged" from FORK_MERGES.md;
          # fall back to the fork point if no merges recorded yet.
          sha="$(grep -m1 -oE 'Upstream tip merged: \`?[0-9a-f]{7,40}\`?' FORK_MERGES.md 2>/dev/null \
                | head -n1 \
                | grep -oE '[0-9a-f]{7,40}' || true)"
          if [ -z "$sha" ]; then sha="$FORK_POINT"; fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "Last merged upstream tip: $sha"

      - name: Compute divergence stats
        id: stats
        run: |
          LAST="${{ steps.lastmerge.outputs.sha }}"
          UPSTREAM_TIP="$(git rev-parse --short upstream/main)"
          BEHIND="$(git rev-list --count HEAD..upstream/main)"
          AHEAD="$(git rev-list --count upstream/main..HEAD)"
          NEW_SINCE_LAST="$(git rev-list --count "${LAST}..upstream/main")"

          echo "upstream_tip=$UPSTREAM_TIP" >> "$GITHUB_OUTPUT"
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "ahead=$AHEAD" >> "$GITHUB_OUTPUT"
          echo "new_since_last=$NEW_SINCE_LAST" >> "$GITHUB_OUTPUT"

      - name: Build report body
        id: body
        run: |
          LAST="${{ steps.lastmerge.outputs.sha }}"
          UPSTREAM_TIP="${{ steps.stats.outputs.upstream_tip }}"

          {
            echo "_Generated $(date -u +'%Y-%m-%d %H:%M UTC') by \`.github/workflows/upstream-divergence.yml\`._"
            echo
            echo "## Summary"
            echo
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Fork point | \`${{ env.FORK_POINT }}\` |"
            echo "| Last merged upstream tip | \`${LAST}\` |"
            echo "| Current upstream tip | \`${UPSTREAM_TIP}\` |"
            echo "| Upstream commits since last merge | ${{ steps.stats.outputs.new_since_last }} |"
            echo "| Total: commits in upstream/main not on main | ${{ steps.stats.outputs.behind }} |"
            echo "| Total: commits on main not in upstream/main | ${{ steps.stats.outputs.ahead }} |"
            echo
            echo "## Upstream commits since last recorded merge"
            echo
            COUNT="${{ steps.stats.outputs.new_since_last }}"
            if [ "$COUNT" = "0" ]; then
              echo "_None — fork is caught up to upstream/main._"
            else
              echo '```'
              git log --oneline "${LAST}..upstream/main"
              echo '```'
            fi
            echo
            echo "## File-level change summary"
            echo
            if [ "$COUNT" = "0" ]; then
              echo "_No file changes to report._"
            else
              echo '```'
              git diff --stat "${LAST}..upstream/main" | tail -n 60
              echo '```'
            fi
            echo
            echo "## Next steps"
            echo
            echo "- Inspect the commits above for any that overlap with open \`FORK_CHANGES.md\` items."
            echo "- When ready, run the \`merge-upstream\` Claude skill or \`scripts/merge-upstream.sh\` locally."
            echo "- See \`FORK_PLAN.md\` for the full runbook."
          } > report.md

          # Pass body to next step via file (avoid newline escaping issues).
          echo "path=report.md" >> "$GITHUB_OUTPUT"

      - name: Upsert pinned issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          BODY_FILE="${{ steps.body.outputs.path }}"

          # Find an existing open issue with our label.
          existing="$(gh issue list \
            --state open \
            --label "$ISSUE_LABEL" \
            --search "$ISSUE_TITLE in:title" \
            --json number \
            --jq '.[0].number // empty' || true)"

          if [ -n "$existing" ]; then
            echo "Updating existing issue #$existing"
            gh issue edit "$existing" --body-file "$BODY_FILE"
            gh issue comment "$existing" --body "Report refreshed — $(date -u +'%Y-%m-%d %H:%M UTC'). See issue body for current numbers."
          else
            echo "Creating new issue"
            # Ensure the label exists (idempotent).
            gh label create "$ISSUE_LABEL" \
              --description "Tracks divergence between this fork and awslabs upstream" \
              --color "5319e7" || true
            gh issue create \
              --title "$ISSUE_TITLE" \
              --label "$ISSUE_LABEL" \
              --body-file "$BODY_FILE"
          fi
