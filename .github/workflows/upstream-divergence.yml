name: Upstream divergence report

# Reports how far this fork has drifted from awslabs/backstage-plugins-for-aws.
# Opens (or refreshes) a single pinned issue with the current divergence
# numbers, the list of upstream commits since our last recorded merge in
# FORK_MERGES.md, and a file-level diff summary.
#
# See FORK_PLAN.md (Task 1.3) for context.

'on':
  schedule:
    - cron: '0 12 * * 1'  # Mondays 12:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: upstream-divergence
  cancel-in-progress: false

jobs:
  report:
    name: Compute and publish divergence report
    runs-on: ubuntu-latest
    env:
      UPSTREAM_URL: https://github.com/awslabs/backstage-plugins-for-aws.git
      FORK_POINT: 1b0c194
      ISSUE_TITLE: 'Upstream divergence report'
      ISSUE_LABEL: upstream-divergence
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream "$UPSTREAM_URL" || \
            git remote set-url upstream "$UPSTREAM_URL"
          git fetch upstream --quiet

      - name: Determine last-merged upstream tip
        id: lastmerge
        run: |
          # Read first "Upstream tip merged" from FORK_MERGES.md;
          # fall back to the fork point if no merges recorded yet.
          sha="$(grep -m1 -oE 'Upstream tip merged: `?[0-9a-f]{7,40}`?' FORK_MERGES.md 2>/dev/null \
                | head -n1 \
                | grep -oE '[0-9a-f]{7,40}' || true)"
          if [ -z "$sha" ]; then sha="$FORK_POINT"; fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "Last merged upstream tip: $sha"

      - name: Compute divergence stats
        id: stats
        run: |
          LAST="${{ steps.lastmerge.outputs.sha }}"
          UPSTREAM_TIP="$(git rev-parse --short upstream/main)"
          BEHIND="$(git rev-list --count HEAD..upstream/main)"
          AHEAD="$(git rev-list --count upstream/main..HEAD)"
          NEW_SINCE_LAST="$(git rev-list --count "${LAST}..upstream/main")"

          echo "upstream_tip=$UPSTREAM_TIP" >> "$GITHUB_OUTPUT"
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "ahead=$AHEAD" >> "$GITHUB_OUTPUT"
          echo "new_since_last=$NEW_SINCE_LAST" >> "$GITHUB_OUTPUT"

      - name: Build report body from template
        id: body
        env:
          TEMPLATE_PATH: .github/upstream-divergence-template.md
          LAST: ${{ steps.lastmerge.outputs.sha }}
          UPSTREAM_TIP: ${{ steps.stats.outputs.upstream_tip }}
          NEW_SINCE_LAST: ${{ steps.stats.outputs.new_since_last }}
          BEHIND_TOTAL: ${{ steps.stats.outputs.behind }}
          AHEAD_TOTAL: ${{ steps.stats.outputs.ahead }}
        run: |
          if [ ! -f "$TEMPLATE_PATH" ]; then
            echo "Template not found at $TEMPLATE_PATH" >&2
            exit 1
          fi

          GENERATED_AT="$(date -u +'%Y-%m-%d %H:%M UTC')"

          if [ "$NEW_SINCE_LAST" = "0" ]; then
            COMMIT_LIST_BLOCK="_None — fork is caught up to upstream/main._"
            DIFFSTAT_BLOCK="_No file changes to report._"
          else
            COMMIT_LIST_BLOCK="$(printf '```\n%s\n```' "$(git log --oneline "${LAST}..upstream/main")")"
            DIFFSTAT_BLOCK="$(printf '```\n%s\n```' "$(git diff --stat "${LAST}..upstream/main" | tail -n 60)")"
          fi

          # Strip the leading HTML comment (template editing guide) from the
          # rendered output so it doesn't clutter the issue body.
          sed '1,/^-->$/d' "$TEMPLATE_PATH" > report.md

          # Substitute placeholders. Use a delimiter that won't appear in
          # values; awk handles multi-line substitution cleanly.
          export GENERATED_AT FORK_POINT="${{ env.FORK_POINT }}" LAST UPSTREAM_TIP \
                 NEW_SINCE_LAST BEHIND_TOTAL AHEAD_TOTAL COMMIT_LIST_BLOCK DIFFSTAT_BLOCK
          python3 - <<'PY'
          import os, re, pathlib
          p = pathlib.Path('report.md')
          body = p.read_text()
          mapping = {
              'GENERATED_AT':     os.environ['GENERATED_AT'],
              'FORK_POINT':       os.environ['FORK_POINT'],
              'LAST_MERGED_TIP':  os.environ['LAST'],
              'UPSTREAM_TIP':     os.environ['UPSTREAM_TIP'],
              'NEW_SINCE_LAST':   os.environ['NEW_SINCE_LAST'],
              'BEHIND_TOTAL':     os.environ['BEHIND_TOTAL'],
              'AHEAD_TOTAL':      os.environ['AHEAD_TOTAL'],
              'COMMIT_LIST_BLOCK':os.environ['COMMIT_LIST_BLOCK'],
              'DIFFSTAT_BLOCK':   os.environ['DIFFSTAT_BLOCK'],
          }
          for k, v in mapping.items():
              body = body.replace('{{' + k + '}}', v)
          left = re.findall(r'\{\{[A-Z_]+\}\}', body)
          if left:
              raise SystemExit(f'unsubstituted placeholders: {left}')
          p.write_text(body)
          PY

          echo "path=report.md" >> "$GITHUB_OUTPUT"
          # Also emit to the run summary so the report is visible even if
          # issue creation is skipped or fails.
          cat report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert pinned issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -e
          BODY_FILE="${{ steps.body.outputs.path }}"

          # Find an existing open issue with our label.
          existing="$(gh issue list \
            --state open \
            --label "$ISSUE_LABEL" \
            --search "$ISSUE_TITLE in:title" \
            --json number \
            --jq '.[0].number // empty' || true)"

          if [ -n "$existing" ]; then
            echo "Updating existing issue #$existing"
            gh issue edit "$existing" --body-file "$BODY_FILE"
            gh issue comment "$existing" --body "Report refreshed — $(date -u +'%Y-%m-%d %H:%M UTC'). See issue body for current numbers."
          else
            echo "Creating new issue"
            # Ensure the label exists (idempotent).
            gh label create "$ISSUE_LABEL" \
              --description "Tracks divergence between this fork and awslabs upstream" \
              --color "5319e7" || true
            gh issue create \
              --title "$ISSUE_TITLE" \
              --label "$ISSUE_LABEL" \
              --body-file "$BODY_FILE"
          fi
