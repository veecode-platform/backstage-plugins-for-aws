# local configs
scaffolder:
  defaultEnvironment:
    parameters:
      region: eu-east-1
      organizationName: veecode-saas

# cost insights
costInsights:
  engineerCost: 200000

catalog:
  providers:
    awsConfig:
      default:
        filters:
          resourceTypes:
            - AWS::ECS::Cluster
            - AWS::ECS::Service
            - AWS::ECR::Repository
            - AWS::S3::Bucket
            - AWS::EC2::VPC
            - AWS::EKS::Cluster
        transform:
          fields:
            spec:
              owner:
                value: guests
              system:
                value: examples
        options:
          incremental:
            restLength: { hours: 6 }

genai:
  agents:
    security-hub:
      description: AWS Security Hub findings assistant
      type: langgraph-react
      prompt: |
        You are an AWS security assistant.
        Summarize AWS Security Hub findings and explain:
        - what the issue is
        - which resource is affected
        - how to fix it.
      actions:
        - get-aws-securityhub-findings
      langgraph:
        messagesMaxTokens: 4096
        bedrock:
          modelId: us.anthropic.claude-sonnet-4-20250514-v1:0
          region: us-east-1